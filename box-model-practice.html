<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Practice</title>
    <link rel="stylesheet" href="box-model-practice.css">
</head>
<body>

    <h1>Box Model Practice</h1>
    <section>
        <h2>Understanding the Box Model</h2>
        <div class="box content-box">Content</div>
        <div class="box padding-box">Padding</div>
        <div class="box border-box">Border</div>
        <div class="box margin-box">Margin</div>
    </section>

    <section>
        <h2>Exercise 2: Debug the Layout</h2>
        <div class="broken-box">Fixed Width Box</div>
    </section>

    <section>
        <h2>Card Component</h2>
        <div class="card">
         <img src="https://via.placeholder.com/300x150" alt="image">
         <h3 class="card-title">Card Title</h3>
         <p class="card-desc">This is a description of the card.</p>
         <button class="card-btn">Click Me</button>
        </div>
    </section>    
    
</body>
</html>
